<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Pedal Wasm</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #pedal-container {
            background-color: #2c3e50;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            width: 100%;
            max-width: 600px;
            border: 2px solid #34495e;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            color: #ecf0f1;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
            color: #bdc3c7;
            text-align: center;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #e74c3c;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #7f8c8d;
            border-radius: 2px;
        }

        select {
            width: 100%;
            padding: 8px;
            background-color: #34495e;
            color: #ecf0f1;
            border: 1px solid #7f8c8d;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #e74c3c;
        }

        .power-section {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            border-top: 2px solid #34495e;
            padding-top: 30px;
        }

        #start-audio {
            background-color: #c0392b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
            text-transform: uppercase;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
        }

        #start-audio:hover {
            background-color: #e74c3c;
        }

        #start-audio:active {
            transform: translateY(4px);
            box-shadow: 0 0px 2px rgba(0,0,0,0.5), inset 0 2px 4px rgba(0,0,0,0.3);
        }

        #start-audio.active {
            background-color: #27ae60;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3), 0 0 15px rgba(46, 204, 113, 0.6);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #95a5a6;
        }

        .val-display {
            font-size: 0.75rem;
            color: #95a5a6;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div id="pedal-container">
    <h1>Earth Reverb Wasm</h1>

    <div class="controls-grid">
        <!-- Sliders -->
        <div class="control-group">
            <label for="mix">Mix</label>
            <input type="range" id="mix" min="0" max="1" step="0.01" value="0.5">
            <span class="val-display" id="mix-val">0.50</span>
        </div>
        <div class="control-group">
            <label for="decay">Decay</label>
            <input type="range" id="decay" min="0" max="1" step="0.01" value="0.5">
            <span class="val-display" id="decay-val">0.50</span>
        </div>
        <div class="control-group">
            <label for="preDelay">Pre-Delay</label>
            <input type="range" id="preDelay" min="0" max="1" step="0.01" value="0.0">
            <span class="val-display" id="preDelay-val">0.00</span>
        </div>
        <div class="control-group">
            <label for="filter">Filter</label>
            <input type="range" id="filter" min="0" max="1" step="0.01" value="0.5">
            <span class="val-display" id="filter-val">0.50</span>
        </div>
        <div class="control-group">
            <label for="modDepth">Mod Depth</label>
            <input type="range" id="modDepth" min="0" max="1" step="0.01" value="0.5">
            <span class="val-display" id="modDepth-val">0.50</span>
        </div>
        <div class="control-group">
            <label for="modSpeed">Mod Speed</label>
            <input type="range" id="modSpeed" min="0" max="1" step="0.01" value="0.5">
            <span class="val-display" id="modSpeed-val">0.50</span>
        </div>
        <div class="control-group">
            <label for="eq1Gain">EQ 1 (Lo)</label>
            <input type="range" id="eq1Gain" min="-24" max="24" step="0.1" value="-11">
            <span class="val-display" id="eq1Gain-val">-11.0 dB</span>
        </div>
        <div class="control-group">
            <label for="eq2Gain">EQ 2 (Hi)</label>
            <input type="range" id="eq2Gain" min="-24" max="24" step="0.1" value="5">
            <span class="val-display" id="eq2Gain-val">5.0 dB</span>
        </div>

        <!-- Switches -->
        <div class="control-group">
            <label for="reverbSize">Size</label>
            <select id="reverbSize">
                <option value="0">Small</option>
                <option value="1" selected>Medium</option>
                <option value="2">Big</option>
            </select>
        </div>
        <div class="control-group">
            <label for="octaveMode">Octave</label>
            <select id="octaveMode">
                <option value="0" selected>None</option>
                <option value="1">Up</option>
                <option value="2">Up + Down</option>
            </select>
        </div>
        <div class="control-group">
            <label for="disableInputDiffusion">Input Diff</label>
            <select id="disableInputDiffusion">
                <option value="0" selected>On</option>
                <option value="1">Off</option>
            </select>
        </div>
    </div>

    <div class="power-section">
        <button id="start-audio">Start<br>Audio</button>
    </div>
    <div class="status" id="status-text">Click to start audio processing</div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
