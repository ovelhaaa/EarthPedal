<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apollo</title>
    <style>
        :root {
            color-scheme: dark;
            --space-black: #05070b;
            --space-deep: #0b1118;
            --graphite: #151c25;
            --surface: #111823;
            --surface-soft: #171f2a;
            --surface-elevated: #1c2634;
            --line: rgba(220, 228, 241, 0.12);
            --line-strong: rgba(220, 228, 241, 0.2);
            --text-primary: #edf2ff;
            --text-secondary: #a8b2c4;
            --text-muted: #7d8798;
            --accent: #8fa2d6;
            --accent-soft: rgba(143, 162, 214, 0.24);
            --accent-violet: #96a0d9;
            --shadow: rgba(1, 5, 12, 0.6);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(1200px 500px at 50% 120%, rgba(146, 162, 218, 0.11), transparent 62%),
                radial-gradient(900px 420px at 75% -10%, rgba(120, 132, 186, 0.12), transparent 58%),
                linear-gradient(180deg, var(--space-black) 0%, var(--space-deep) 100%);
            padding: clamp(16px, 4vw, 36px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #pedal-container {
            width: min(980px, 100%);
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background:
                linear-gradient(160deg, rgba(25, 35, 48, 0.78), rgba(12, 18, 27, 0.96) 50%, rgba(8, 11, 18, 1)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 45%);
            box-shadow:
                0 28px 54px var(--shadow),
                inset 0 1px 0 rgba(245, 248, 255, 0.08),
                inset 0 -18px 40px rgba(2, 8, 19, 0.5);
            padding: clamp(18px, 3vw, 34px);
            position: relative;
            overflow: hidden;
        }

        #pedal-container::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(580px 140px at 50% 106%, rgba(150, 164, 220, 0.12), transparent 70%);
        }

        .title-block {
            text-align: center;
            margin-bottom: clamp(18px, 3vw, 28px);
            position: relative;
            z-index: 1;
        }

        .title-block h1 {
            margin: 0;
            font-size: clamp(1.35rem, 4.5vw, 2.4rem);
            letter-spacing: clamp(0.22em, 1vw, 0.4em);
            text-transform: uppercase;
            font-weight: 300;
            color: var(--text-primary);
        }

        .subtitle {
            margin-top: 10px;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: clamp(0.66rem, 2.6vw, 0.8rem);
            font-weight: 400;
        }

        .panel-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(12px, 2vw, 18px);
        }

        .panel {
            background: linear-gradient(180deg, rgba(26, 34, 45, 0.7), rgba(15, 21, 31, 0.9));
            border: 1px solid rgba(227, 233, 245, 0.08);
            border-radius: var(--radius-md);
            padding: clamp(14px, 2.4vw, 22px);
            box-shadow: inset 0 1px 0 rgba(249, 251, 255, 0.03);
            backdrop-filter: blur(3px);
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.17em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .engine-panel,
        .source-panel,
        .transport-panel {
            grid-column: span 1;
        }

        .engine-panel {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: clamp(14px, 2vw, 20px);
        }

        .power-button {
            width: clamp(78px, 19vw, 88px);
            aspect-ratio: 1;
            border-radius: 999px;
            border: 1px solid var(--line-strong);
            background: radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.16), rgba(36, 46, 60, 0.94) 60%, rgba(16, 22, 34, 1));
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 500;
            transition: transform 120ms ease, box-shadow 180ms ease, border-color 180ms ease, background 220ms ease;
            box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.14), 0 8px 20px rgba(2, 8, 18, 0.8);
            min-height: 48px;
        }

        .power-button:hover {
            transform: translateY(-1px);
            border-color: rgba(210, 220, 245, 0.4);
        }

        .power-button:active {
            transform: translateY(1px);
        }

        .power-button:focus-visible,
        button.transport:focus-visible,
        select:focus-visible,
        input[type="file"]:focus-visible,
        input[type="range"]:focus-visible,
        input[type="checkbox"]:focus-visible {
            outline: 2px solid rgba(166, 183, 231, 0.75);
            outline-offset: 2px;
        }

        .power-button.running {
            border-color: rgba(150, 167, 220, 0.6);
            background: radial-gradient(circle at 35% 30%, rgba(230, 236, 255, 0.22), rgba(58, 74, 99, 0.94) 58%, rgba(17, 27, 41, 1));
            box-shadow:
                inset 0 1px 4px rgba(255, 255, 255, 0.18),
                0 0 0 1px rgba(151, 166, 221, 0.4),
                0 0 18px rgba(120, 137, 194, 0.22);
        }

        .engine-readout {
            display: grid;
            gap: 8px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            width: fit-content;
            border: 1px solid var(--line);
            background: rgba(14, 20, 29, 0.76);
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            box-shadow: 0 0 0 0 rgba(145, 162, 220, 0.45);
        }

        .status-pill[data-state="off"] .status-dot { background: #6f7784; }
        .status-pill[data-state="initializing"] .status-dot { background: #e1cf9f; }
        .status-pill[data-state="running"] .status-dot {
            background: #d8e5ff;
            animation: pulse 2.4s ease-out infinite;
        }
        .status-pill[data-state="error"] .status-dot { background: #f09ca8; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(151, 169, 224, 0.48); }
            70% { box-shadow: 0 0 0 6px rgba(151, 169, 224, 0); }
            100% { box-shadow: 0 0 0 0 rgba(151, 169, 224, 0); }
        }

        .status {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.86rem;
            line-height: 1.45;
            min-height: 1.3em;
        }

        .source-panel .source-row,
        .timeline-wrap {
            display: grid;
            gap: 10px;
        }

        .field-label {
            font-size: 0.69rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.14em;
        }

        select,
        input[type="file"],
        button.transport,
        .timeline {
            width: 100%;
        }

        select,
        input[type="file"] {
            background: var(--surface-soft);
            color: var(--text-primary);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font: inherit;
            font-size: 0.88rem;
            min-height: 48px;
        }

        input[type="file"]::file-selector-button {
            background: var(--surface-elevated);
            color: var(--text-primary);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 12px;
            margin-right: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.68rem;
            letter-spacing: 0.08em;
        }

        .source-badge {
            display: inline-flex;
            border-radius: 999px;
            padding: 6px 12px;
            border: 1px solid var(--line);
            width: fit-content;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: rgba(20, 28, 38, 0.6);
        }

        .source-badge.active {
            color: var(--text-primary);
            border-color: rgba(146, 165, 220, 0.55);
            background: rgba(146, 165, 220, 0.14);
        }

        .transport-panel,
        .params-panel,
        .switches-panel {
            grid-column: 1 / -1;
        }

        .transport-panel {
            display: grid;
            gap: 12px;
        }

        .transport-buttons {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        button.transport {
            min-height: 46px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 10px;
            background: linear-gradient(180deg, rgba(35, 47, 62, 0.86), rgba(20, 28, 40, 0.96));
            font-weight: 500;
            letter-spacing: 0.11em;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.71rem;
            transition: transform 120ms ease, border-color 180ms ease, background 180ms ease;
        }

        button.transport:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: rgba(173, 188, 232, 0.35);
        }

        button.transport:disabled {
            cursor: not-allowed;
            opacity: 0.42;
        }

        .transport-state {
            font-size: 0.84rem;
            color: var(--text-secondary);
            min-height: 1.35em;
            line-height: 1.4;
        }

        .timeline {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-violet) var(--progress, 0%), rgba(109, 122, 150, 0.35) var(--progress, 0%));
            outline: none;
        }

        .timeline::-webkit-slider-thumb,
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(235, 242, 255, 0.65);
            background: #e8efff;
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(143, 162, 214, 0.22);
        }

        .timeline::-moz-range-thumb,
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(235, 242, 255, 0.65);
            background: #e8efff;
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(143, 162, 214, 0.22);
        }

        .timeline-times {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            font-variant-numeric: tabular-nums;
        }

        .loop-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(146px, 1fr));
            gap: 12px;
        }

        .control-group {
            background: rgba(20, 28, 39, 0.68);
            border: 1px solid rgba(227, 235, 246, 0.08);
            border-radius: 12px;
            padding: 12px;
            display: grid;
            gap: 10px;
        }

        .control-group label {
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 999px;
            background: rgba(121, 135, 165, 0.35);
        }

        .val-display {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        @media (max-width: 780px) {
            body {
                padding: 12px;
                align-items: stretch;
            }

            #pedal-container {
                border-radius: 16px;
                min-height: calc(100vh - 24px);
            }

            .panel-grid {
                grid-template-columns: 1fr;
            }

            .engine-panel,
            .source-panel,
            .transport-panel,
            .params-panel,
            .switches-panel {
                grid-column: 1 / -1;
            }

            .engine-panel {
                grid-template-columns: 1fr;
                justify-items: center;
                text-align: center;
            }

            .engine-readout {
                justify-items: center;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .transport-buttons {
                grid-template-columns: 1fr;
            }

            .title-block h1 {
                letter-spacing: 0.19em;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
<div id="pedal-container">
    <div class="title-block">
        <h1>Apollo</h1>
        <div class="subtitle">for atmospheres and soundtracks.</div>
    </div>

    <div class="panel-grid">
        <section class="panel engine-panel">
            <button id="start-audio" class="power-button" aria-label="Toggle audio engine">Power</button>
            <div class="engine-readout">
                <h2>Engine Power</h2>
                <div class="status-pill" id="status-pill" data-state="off">
                    <span class="status-dot" aria-hidden="true"></span>
                    <span id="engine-state-label">Engine Off</span>
                </div>
                <p class="status" id="status-text">Audio path inactive. Engage power to initialize the DSP engine.</p>
            </div>
        </section>

        <section class="panel source-panel">
            <h2>Source Selection</h2>
            <div class="source-row">
                <label class="field-label" for="audioSource">Input Source</label>
                <select id="audioSource">
                    <option value="mic" selected>Real-time Mic</option>
                    <option value="file">File Player</option>
                </select>
                <span id="active-source-badge" class="source-badge">Mic Active</span>
            </div>
        </section>

        <section class="panel transport-panel" id="file-player-controls">
            <h2>File Transport</h2>
            <label class="field-label" for="audioFile">Load Audio File</label>
            <input type="file" id="audioFile" accept="audio/*">
            <div class="transport-buttons">
                <button id="playFileBtn" class="transport">Play</button>
                <button id="pauseFileBtn" class="transport">Pause</button>
                <button id="stopFileBtn" class="transport">Stop</button>
            </div>
            <div class="transport-state" id="transport-state">No file loaded.</div>
            <div class="timeline-wrap">
                <input type="range" id="transportTimeline" class="timeline" min="0" max="100" value="0" step="0.1">
                <div class="timeline-times">
                    <span id="elapsed-time">00:00</span>
                    <span id="duration-time">00:00</span>
                </div>
            </div>
            <label class="loop-row" for="loopPlayback">
                <input type="checkbox" id="loopPlayback" checked>
                Loop playback
            </label>
        </section>

        <section class="panel params-panel">
            <h2>Main Parameters</h2>
            <div class="controls-grid">
                <div class="control-group">
                    <label for="mix">Mix</label>
                    <input type="range" id="mix" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="mix-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="decay">Decay</label>
                    <input type="range" id="decay" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="decay-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="preDelay">Pre-Delay</label>
                    <input type="range" id="preDelay" min="0" max="1" step="0.01" value="0.0">
                    <span class="val-display" id="preDelay-val">0.00</span>
                </div>
                <div class="control-group">
                    <label for="filter">Filter</label>
                    <input type="range" id="filter" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="filter-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="modDepth">Mod Depth</label>
                    <input type="range" id="modDepth" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="modDepth-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="modSpeed">Mod Speed</label>
                    <input type="range" id="modSpeed" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="modSpeed-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="eq1Gain">EQ 1 (Hi)</label>
                    <input type="range" id="eq1Gain" min="-24" max="24" step="0.1" value="-11">
                    <span class="val-display" id="eq1Gain-val">-11.0 dB</span>
                </div>
                <div class="control-group">
                    <label for="eq2Gain">EQ 2 (Lo)</label>
                    <input type="range" id="eq2Gain" min="-24" max="24" step="0.1" value="5">
                    <span class="val-display" id="eq2Gain-val">5.0 dB</span>
                </div>
            </div>
        </section>

        <section class="panel switches-panel">
            <h2>Mode Switches</h2>
            <div class="controls-grid">
                <div class="control-group">
                    <label for="reverbSize">Size</label>
                    <select id="reverbSize">
                        <option value="0">Small</option>
                        <option value="1" selected>Medium</option>
                        <option value="2">Big</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="octaveMode">Octave</label>
                    <select id="octaveMode">
                        <option value="0" selected>None</option>
                        <option value="1">Up</option>
                        <option value="2">Up + Down</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="disableInputDiffusion">Input Diffusion</label>
                    <select id="disableInputDiffusion">
                        <option value="0" selected>On</option>
                        <option value="1">Off</option>
                    </select>
                </div>
            </div>
        </section>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
