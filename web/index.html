<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo</title>
    <style>
        :root {
            --vacuum: #000000;
            --deep-space: #050505;
            --panel: #0a0a0a;
            --panel-raised: #141414;
            --metal: #222222;
            --text: #e0e0e0;
            --muted: #707070;
            --earth-blue: #ff2a00;
            --earth-glow: rgba(255, 42, 0, 0.45);
            --ok: #ff2a00;
            --warn: #ffcc00;
            --error: #ff0000;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 500px at 50% 120%, rgba(255, 42, 0, 0.15), transparent 60%),
                radial-gradient(900px 300px at 60% -10%, rgba(255, 42, 0, 0.12), transparent 60%),
                linear-gradient(180deg, #000000 0%, #030303 65%, #050505 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 16px;
        }

        #pedal-container {
            width: min(980px, 100%);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background:
                linear-gradient(160deg, rgba(15, 15, 15, 0.9), rgba(5, 5, 5, 0.98) 48%, rgba(0, 0, 0, 1)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0));
            box-shadow:
                0 24px 52px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                inset 0 -8px 24px rgba(0, 0, 0, 0.6),
                0 0 80px rgba(255, 42, 0, 0.08);
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        #pedal-container::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(650px 140px at 50% 108%, rgba(255, 42, 0, 0.1), transparent 66%),
                linear-gradient(transparent 0%, rgba(255, 255, 255, 0.01) 50%, transparent 100%);
        }

        .title-block {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .title-block h1 {
            margin: 0;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 300;
            color: #ffffff;
        }

        .subtitle {
            color: var(--muted);
            margin-top: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 300;
        }

        .panel-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .panel {
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.8), rgba(10, 10, 10, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 20px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02), inset 0 -1px 0 rgba(0, 0, 0, 0.8);
        }

        .panel h2 {
            margin: 0 0 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #a0a0a0;
            font-weight: 400;
        }

        .engine-panel,
        .source-panel,
        .transport-panel {
            grid-column: span 1;
        }

        .engine-panel {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 20px;
        }

        .power-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background:
                radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.1), rgba(30, 30, 30, 0.9) 65%, rgba(10, 10, 10, 1));
            color: #ffffff;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 400;
            transition: transform 120ms ease, box-shadow 180ms ease, border-color 180ms ease;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.05), 0 4px 12px rgba(0, 0, 0, 0.8);
        }

        .power-button:hover { transform: translateY(-1px); }
        .power-button:active { transform: translateY(1px); }
        .power-button.running {
            border-color: rgba(255, 42, 0, 0.6);
            box-shadow:
                inset 0 2px 4px rgba(255, 255, 255, 0.1),
                0 0 0 1px rgba(255, 42, 0, 0.3),
                0 0 20px rgba(255, 42, 0, 0.4);
        }

        .engine-readout {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 2px;
            width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 15, 15, 0.8);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            box-shadow: 0 0 0 0 rgba(255, 42, 0, 0.5);
        }

        .status-pill[data-state="off"] .status-dot { background: #555555; }
        .status-pill[data-state="initializing"] .status-dot { background: var(--warn); }
        .status-pill[data-state="ready"] .status-dot { background: #ffffff; }
        .status-pill[data-state="running"] .status-dot {
            background: var(--ok);
            animation: pulse 2.5s ease-out infinite;
        }
        .status-pill[data-state="error"] .status-dot { background: var(--error); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 42, 0, 0.6); }
            70% { box-shadow: 0 0 0 6px rgba(255, 42, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 42, 0, 0); }
        }

        .status {
            margin: 0;
            color: var(--muted);
            font-size: 0.86rem;
            min-height: 1.3em;
        }

        .source-panel .source-row {
            display: grid;
            gap: 8px;
        }

        .field-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #808080;
            letter-spacing: 0.15em;
        }

        select,
        input[type="file"],
        button.transport,
        .timeline {
            width: 100%;
        }

        select,
        input[type="file"] {
            background: rgba(20, 20, 20, 0.9);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            padding: 10px 12px;
            font: inherit;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        input[type="file"]::file-selector-button {
            background: rgba(40, 40, 40, 0.9);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            padding: 6px 12px;
            margin-right: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .source-badge {
            display: inline-flex;
            border-radius: 2px;
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: fit-content;
            font-size: 0.7rem;
            color: #808080;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .source-badge.active {
            color: #ffffff;
            border-color: rgba(255, 42, 0, 0.5);
            background: rgba(255, 42, 0, 0.05);
            box-shadow: 0 0 10px rgba(255, 42, 0, 0.1);
        }

        .transport-panel {
            grid-column: 1 / -1;
            display: grid;
            gap: 10px;
        }

        .transport-buttons {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        button.transport {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            color: var(--text);
            padding: 10px;
            background: linear-gradient(180deg, rgba(40, 40, 40, 0.8), rgba(20, 20, 20, 0.9));
            font-weight: 400;
            letter-spacing: 0.15em;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        button.transport:disabled {
            cursor: not-allowed;
            opacity: 0.3;
        }

        .transport-state {
            font-size: 0.8rem;
            color: #a0a0a0;
            min-height: 1.3em;
            letter-spacing: 0.05em;
        }

        .timeline-wrap {
            display: grid;
            gap: 6px;
        }

        .timeline {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, rgba(255, 42, 0, 0.6) var(--progress, 0%), rgba(60, 60, 60, 0.5) var(--progress, 0%));
            outline: none;
        }

        .timeline::-webkit-slider-thumb,
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 16px;
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: #e0e0e0;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
        }

        .timeline::-moz-range-thumb,
        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 16px;
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: #e0e0e0;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
        }

        .timeline::-webkit-slider-runnable-track,
        input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
        }

        .timeline-times {
            display: flex;
            justify-content: space-between;
            color: #808080;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        .loop-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #a0a0a0;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .params-panel,
        .switches-panel {
            grid-column: 1 / -1;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .control-group {
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            padding: 12px;
            display: grid;
            gap: 10px;
        }

        .control-group label {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #a0a0a0;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(60, 60, 60, 0.6);
        }

        .val-display {
            font-size: 0.7rem;
            color: #808080;
            letter-spacing: 0.05em;
            font-family: monospace;
        }

        @media (max-width: 780px) {
            .panel-grid {
                grid-template-columns: 1fr;
            }

            .engine-panel,
            .source-panel,
            .transport-panel,
            .params-panel,
            .switches-panel {
                grid-column: 1 / -1;
            }

            .engine-panel {
                grid-template-columns: 1fr;
                justify-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div id="pedal-container">
    <div class="title-block">
        <h1>Apollo</h1>
        <div class="subtitle">Use for atmospheres and soundtracks.</div>
    </div>

    <div class="panel-grid">
        <section class="panel engine-panel">
            <button id="start-audio" class="power-button" aria-label="Toggle audio engine">Power</button>
            <div class="engine-readout">
                <h2>Engine Power</h2>
                <div class="status-pill" id="status-pill" data-state="off">
                    <span class="status-dot" aria-hidden="true"></span>
                    <span id="engine-state-label">Engine Off</span>
                </div>
                <p class="status" id="status-text">Audio path inactive. Engage power to initialize the DSP engine.</p>
            </div>
        </section>

        <section class="panel source-panel">
            <h2>Source Selection</h2>
            <div class="source-row">
                <label class="field-label" for="audioSource">Input Source</label>
                <select id="audioSource">
                    <option value="mic" selected>Real-time Mic</option>
                    <option value="file">File Player</option>
                </select>
                <span id="active-source-badge" class="source-badge">Mic Active</span>
            </div>
        </section>

        <section class="panel transport-panel" id="file-player-controls">
            <h2>File Transport</h2>
            <label class="field-label" for="audioFile">Load Audio File</label>
            <input type="file" id="audioFile" accept="audio/*">
            <div class="transport-buttons">
                <button id="playFileBtn" class="transport">Play</button>
                <button id="pauseFileBtn" class="transport">Pause</button>
                <button id="stopFileBtn" class="transport">Stop</button>
            </div>
            <div class="transport-state" id="transport-state">No file loaded.</div>
            <div class="timeline-wrap">
                <input type="range" id="transportTimeline" class="timeline" min="0" max="100" value="0" step="0.1">
                <div class="timeline-times">
                    <span id="elapsed-time">00:00</span>
                    <span id="duration-time">00:00</span>
                </div>
            </div>
            <label class="loop-row" for="loopPlayback">
                <input type="checkbox" id="loopPlayback" checked>
                Loop playback
            </label>
        </section>

        <section class="panel params-panel">
            <h2>Main Parameters</h2>
            <div class="controls-grid">
                <div class="control-group">
                    <label for="mix">Mix</label>
                    <input type="range" id="mix" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="mix-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="decay">Decay</label>
                    <input type="range" id="decay" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="decay-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="preDelay">Pre-Delay</label>
                    <input type="range" id="preDelay" min="0" max="1" step="0.01" value="0.0">
                    <span class="val-display" id="preDelay-val">0.00</span>
                </div>
                <div class="control-group">
                    <label for="filter">Filter</label>
                    <input type="range" id="filter" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="filter-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="modDepth">Mod Depth</label>
                    <input type="range" id="modDepth" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="modDepth-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="modSpeed">Mod Speed</label>
                    <input type="range" id="modSpeed" min="0" max="1" step="0.01" value="0.5">
                    <span class="val-display" id="modSpeed-val">0.50</span>
                </div>
                <div class="control-group">
                    <label for="eq1Gain">EQ 1 (Hi)</label>
                    <input type="range" id="eq1Gain" min="-24" max="24" step="0.1" value="-11">
                    <span class="val-display" id="eq1Gain-val">-11.0 dB</span>
                </div>
                <div class="control-group">
                    <label for="eq2Gain">EQ 2 (Lo)</label>
                    <input type="range" id="eq2Gain" min="-24" max="24" step="0.1" value="5">
                    <span class="val-display" id="eq2Gain-val">5.0 dB</span>
                </div>
            </div>
        </section>

        <section class="panel switches-panel">
            <h2>Mode Switches</h2>
            <div class="controls-grid">
                <div class="control-group">
                    <label for="reverbSize">Size</label>
                    <select id="reverbSize">
                        <option value="0">Small</option>
                        <option value="1" selected>Medium</option>
                        <option value="2">Big</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="octaveMode">Octave</label>
                    <select id="octaveMode">
                        <option value="0" selected>None</option>
                        <option value="1">Up</option>
                        <option value="2">Up + Down</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="disableInputDiffusion">Input Diffusion</label>
                    <select id="disableInputDiffusion">
                        <option value="0" selected>On</option>
                        <option value="1">Off</option>
                    </select>
                </div>
            </div>
        </section>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
