name: Deploy EarthPedal to GH Pages

on:
  push:
    branches:
      - main
      - codex/extract-polyphonic-octave-algorithm-to-module
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout octave branch
        uses: actions/checkout@v4
        with:
          ref: codex/extract-polyphonic-octave-algorithm-to-module
          path: octave-src

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50

      - name: Build main web app
        working-directory: main-src
        run: |
          bash src/makefile_wasm

      - name: Build octave web app
        working-directory: octave-src
        run: |
          mkdir -p deps
          if [ ! -d "deps/q" ]; then
            git clone https://github.com/cycfi/q.git deps/q
          fi
          if [ ! -d "deps/gcem" ]; then
            git clone https://github.com/kthohr/gcem.git deps/gcem
          fi
          if [ ! -d "deps/infra" ]; then
            git clone https://github.com/cycfi/infra.git deps/infra
          fi

          emcc -O3 \
            --bind \
            -s WASM=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORT_ES6=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME="'OctaveModule'" \
            -s EXPORTED_FUNCTIONS="['_malloc', '_free']" \
            -std=c++20 \
            -I./deps/q/q_lib/include \
            -I./deps/gcem/include \
            -I./deps/infra/include \
            -I./Util \
            src/octave_wasm_wrapper.cpp \
            poly_octave/poly_octaver.cpp \
            -o web/octave-module.js

      - name: Assemble Pages dist
        run: |
          rm -rf dist
          mkdir -p dist/octave
          cp -R main-src/web/. dist/
          cp -R octave-src/web/. dist/octave/
          cp octave-src/web/octave.html dist/octave/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
