name: Deploy EarthPedal to GH Pages

on:
  push:
    branches: [ main ] # Ajuste para 'master' se for o caso

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50 # Versão estável do emcc

      - name: Install Dependencies
        run: |
          mkdir -p deps
          git clone https://github.com/cycfi/q.git deps/q
          git clone https://github.com/kthohr/gcem.git deps/gcem
          git clone https://github.com/cycfi/infra.git deps/infra

      - name: Compile WASM
        run: |
          mkdir -p web
          
          emcc -O3 \
            --bind \
            -s WASM=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORT_ES6=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME="'EarthModule'" \
            -s ENVIRONMENT=worker \
            -s EXPORTED_FUNCTIONS="['_malloc', '_free']" \
            -std=c++20 \
            -I./deps/q/q_lib/include \
            -I./deps/gcem/include \
            -I./deps/infra/include \
            -I./Dattorro \
            -I./Util \
            src/wasm_wrapper.cpp \
            Dattorro/dsp/filters/OnePoleFilters.cpp \
            Dattorro/dsp/delays/InterpDelay.cpp \
            Dattorro/Dattorro.cpp \
            -o web/earth-module.js


      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Faz o deploy apenas do conteúdo da pasta 'web'
          path: './web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
