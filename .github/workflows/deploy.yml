name: Deploy EarthPedal to GH Pages

on:
  push:
    branches:
      - main
      - codex/extract-polyphonic-octave-algorithm-to-module
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout octave branch
        uses: actions/checkout@v4
        with:
          ref: codex/extract-polyphonic-octave-algorithm-to-module
          path: octave-src

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50

      - name: Build main web app
        working-directory: main-src
        run: |
          bash src/makefile_wasm

      - name: Build octave web app
        working-directory: octave-src
        run: |
          bash src/makefile_wasm_octave

      - name: Assemble Pages dist
        run: |
          rm -rf dist
          mkdir -p dist/octave
          cp -R main-src/web/. dist/
          cp -R octave-src/web/. dist/octave/
          cp octave-src/web/octave.html dist/octave/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
